name: Automated Scraper Run

on:
  schedule:
    - cron: '0 */6 * * *' # Every 6 hours
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout Bot Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 fake-useragent

      - name: Clone Data Repository
        env:
          DATA_REPO_URL: "https://x-access-token:${{ secrets.DATA_REPO_PAT }}@github.com/TAYVR/GDYEF_53F2E62__YTUEW.git"
        run: |
          git clone $DATA_REPO_URL data_repo

      - name: Run Scraper
        run: |
          timeout 5h python scraper.py || true

      - name: Push Data Repo Changes
        working-directory: data_repo
        run: |
          git config --global user.name "Scraper Bot"
          git config --global user.email "bot@codelist.cc"
          
          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Automation: Scraped at $(date +"%Y-%m-%d %H:%M")"
            git push
          fi
